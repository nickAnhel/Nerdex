services:
  migrate:
    container_name: migrate
    restart: "no"
    command: bash -c "alembic upgrade head"
    build:
      context: ./server
      dockerfile: ./Dockerfile
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
      - ./server/tests:/app/tests
      - ./server/pyproject.toml:/app/pyproject.toml
      - ./server/uv.lock:/app/uv.lock
      - ./server/alembic.ini:/app/alembic.ini
      - ./server/.env:/app/.env
    env_file:
      - ./server/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    container_name: server
    restart: on-failure
    command: bash -c "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    # command: bash -c "gunicorn -b 0.0.0.0:8000 -w 5 -k uvicorn.workers.UvicornWorker src.main:app"
    build:
      context: ./server
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
      - ./server/tests:/app/tests
      - ./server/pyproject.toml:/app/pyproject.toml
      - ./server/uv.lock:/app/uv.lock
      - ./server/alembic.ini:/app/alembic.ini
      - ./server/.env:/app/.env
    env_file:
      - ./server/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery_worker:
    container_name: celery_worker
    restart: on-failure
    command: bash -c "celery -A src.assets.celery_app:celery_app worker --loglevel=INFO -Q media"
    build:
      context: ./server
      dockerfile: ./Dockerfile
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
      - ./server/tests:/app/tests
      - ./server/pyproject.toml:/app/pyproject.toml
      - ./server/uv.lock:/app/uv.lock
      - ./server/alembic.ini:/app/alembic.ini
      - ./server/.env:/app/.env
    env_file:
      - ./server/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy

  celery_beat:
    container_name: celery_beat
    restart: on-failure
    command: bash -c "celery -A src.assets.celery_app:celery_app beat --loglevel=INFO"
    build:
      context: ./server
      dockerfile: ./Dockerfile
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
      - ./server/tests:/app/tests
      - ./server/pyproject.toml:/app/pyproject.toml
      - ./server/uv.lock:/app/uv.lock
      - ./server/alembic.ini:/app/alembic.ini
      - ./server/.env:/app/.env
    env_file:
      - ./server/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy

  neo4j_backfill:
    container_name: neo4j_backfill
    restart: "no"
    command: bash -c "python -m src.recommendations.sync incremental-sync"
    build:
      context: ./server
      dockerfile: ./Dockerfile
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
      - ./server/tests:/app/tests
      - ./server/pyproject.toml:/app/pyproject.toml
      - ./server/uv.lock:/app/uv.lock
      - ./server/alembic.ini:/app/alembic.ini
      - ./server/.env:/app/.env
    env_file:
      - ./server/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy

  db:
    container_name: db
    image: postgres:17
    restart: on-failure
    ports:
      - 5432:5432
    env_file:
      - ./.postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: on-failure
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: on-failure
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://127.0.0.1:7687 -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 20

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    ports:
      - 5050:80
    env_file:
      - ./.postgres-env
    depends_on:
      db:
        condition: service_healthy

  client:
    container_name: client
    restart: on-failure
    build:
      context: ./client/
      dockerfile: ./Dockerfile
    command: bash -c "npm start"
    ports:
      - 80:3000
    env_file:
      - ./client/.env
    volumes:
      - ./client/:/project/
      - node_modules:/project/node_modules
    depends_on:
      server:
        condition: service_healthy

  loki:
    container_name: loki
    image: grafana/loki:3.0.0
    restart: on-failure
    command: -config.file=/etc/loki/config.yaml
    ports:
      - 3100:3100
    volumes:
      - ./monitoring/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki

  alloy:
    container_name: alloy
    image: grafana/alloy:v1.7.2
    restart: on-failure
    command: run /etc/alloy/config.alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_started

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.53.0
    restart: on-failure
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      server:
        condition: service_healthy

  grafana:
    container_name: grafana
    image: grafana/grafana:11.0.0
    restart: on-failure
    ports:
      - 3001:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  neo4j_data:
  node_modules:
  loki_data:
  prometheus_data:
  grafana_data:
