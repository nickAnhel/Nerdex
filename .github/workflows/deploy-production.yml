name: Deploy production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy, for example v1.0.0"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy selected tag
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            APP_DIR="/opt/diploma"
            TAG="${{ inputs.tag }}"

            cd "$APP_DIR"

            echo "Fetching repository..."
            git fetch --all --tags --prune

            echo "Checking tag exists..."
            git rev-parse "refs/tags/$TAG" >/dev/null 2>&1 || {
              echo "Tag not found: $TAG"
              exit 1
            }

            echo "Switching to tag $TAG..."
            git reset --hard
            git clean -fd
            git checkout --force "tags/$TAG"

            echo "$TAG" > .deployed-version

            echo "Building and starting containers..."
            docker compose up -d --build

            echo "Cleaning unused Docker data..."
            docker system prune -f

            echo "Deployed version:"
            cat .deployed-version