version: 1

provider: pixabay

defaults:
  lang: en
  safesearch: true
  order: popular
  images:
    image_type: photo
    orientation: horizontal
    min_width: 960
    min_height: 540
    per_page: 40
    max_file_size_mb: 2
  videos:
    video_type: film
    min_width: 640
    min_height: 360
    per_page: 20
    max_file_size_mb: 25
    preferred_renditions:
      - small
      - tiny
    forbidden_renditions:
      - medium
      - large
    max_duration_seconds: 120
  moments:
    video_type: film
    per_page: 20
    max_file_size_mb: 20
    preferred_renditions:
      - tiny
      - small
    max_duration_seconds: 90
    require_portrait: true

